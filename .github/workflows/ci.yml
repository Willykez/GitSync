name: CI build check

# Runs on every push and pull request — a fast debug build (no signing, no
# shrinking) just to catch compile errors quickly. Since you're building
# from your phone via GitHub Actions rather than a local IDE, this is your
# main feedback loop: check this workflow's log first whenever a push looks
# like it failed, before digging into the release workflow.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Assemble debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gitsync-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
