name: Build signed release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Generate signing keystore
        id: keystore
        shell: bash
        run: |
          KEYSTORE_PASSWORD=$(openssl rand -hex 16)
          KEYSTORE_PATH="$RUNNER_TEMP/gitsync-release.keystore"

          keytool -genkeypair \
            -storetype PKCS12 \
            -keystore "$KEYSTORE_PATH" \
            -alias gitsync \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEYSTORE_PASSWORD" \
            -dname "CN=GitSync, OU=GitSync, O=GitSync, L=Unknown, S=Unknown, C=TZ"

          echo "::add-mask::$KEYSTORE_PASSWORD"

          echo "keystore_password=$KEYSTORE_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "keystore_path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: |
          gradle assembleRelease \
            -PGITSYNC_RELEASE_STORE_FILE="${{ steps.keystore.outputs.keystore_path }}" \
            -PGITSYNC_RELEASE_STORE_PASSWORD="${{ steps.keystore.outputs.keystore_password }}" \
            -PGITSYNC_RELEASE_KEY_ALIAS="gitsync" \
            -PGITSYNC_RELEASE_KEY_PASSWORD="${{ steps.keystore.outputs.keystore_password }}" \
            --no-daemon

      - name: Locate APK
        id: apk
        shell: bash
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)

          if [ -z "$APK_PATH" ]; then
            echo "APK not found!"
            exit 1
          fi

          echo "Found APK: $APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitSync-Release
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('build-{0}', github.run_number) || github.ref_name }}
          name: GitSync Build #${{ github.run_number }}
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}