name: Build signed release APK

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:


permissions:
  contents: write


jobs:

  build-release:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4



      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"



      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"



      # -------------------------------------------------------
      # Decode permanent signing keystore
      # -------------------------------------------------------

      - name: Configure release keystore
        id: keystore

        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

        run: |

          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::KEYSTORE_B64 secret is missing"
            exit 1
          fi


          if [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Signing passwords are missing"
            exit 1
          fi


          if [ "$STORE_PASSWORD" != "$KEY_PASSWORD" ]; then
            echo "::error::STORE_PASSWORD and KEY_PASSWORD must be identical for PKCS12 keystores"
            exit 1
          fi


          KEYSTORE_PATH="$RUNNER_TEMP/gitsync-release.keystore"


          echo "$KEYSTORE_B64" | base64 --decode > "$KEYSTORE_PATH"



          if [ ! -s "$KEYSTORE_PATH" ]; then
            echo "::error::Keystore file was not created"
            exit 1
          fi



          KEY_ALIAS="upload"



          echo "::add-mask::$STORE_PASSWORD"


          echo "keystore_path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"
          echo "keystore_password=$STORE_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "key_password=$KEY_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "key_alias=$KEY_ALIAS" >> "$GITHUB_OUTPUT"



      # -------------------------------------------------------
      # Build signed release APK
      # -------------------------------------------------------

      - name: Build release APK

        run: |

          gradle assembleRelease \
            -PGITSYNC_RELEASE_STORE_FILE="${{ steps.keystore.outputs.keystore_path }}" \
            -PGITSYNC_RELEASE_STORE_PASSWORD="${{ steps.keystore.outputs.keystore_password }}" \
            -PGITSYNC_RELEASE_KEY_ALIAS="${{ steps.keystore.outputs.key_alias }}" \
            -PGITSYNC_RELEASE_KEY_PASSWORD="${{ steps.keystore.outputs.key_password }}" \
            --no-daemon



      # -------------------------------------------------------
      # Locate APK
      # -------------------------------------------------------

      - name: Locate APK

        id: apk

        run: |

          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)


          if [ -z "$APK_PATH" ]; then
            echo "::error::Release APK not found"
            exit 1
          fi


          echo "Found APK:"
          echo "$APK_PATH"


          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"



      # -------------------------------------------------------
      # Upload artifact
      # -------------------------------------------------------

      - name: Upload APK artifact

        uses: actions/upload-artifact@v4

        with:

          name: gitsync-release-apk

          path: ${{ steps.apk.outputs.path }}

          retention-days: 30



      # -------------------------------------------------------
      # Create GitHub Release from version tag
      # -------------------------------------------------------

      - name: Create GitHub Release

        if: startsWith(github.ref, 'refs/tags/v')

        uses: softprops/action-gh-release@v2

        with:

          files: ${{ steps.apk.outputs.path }}

          generate_release_notes: true